services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pentographer:pentographer@db:5432/pentographer
      AUTH_SECRET: ${AUTH_SECRET:-changeme_in_production_use_a_long_random_string}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${AUTH_SECRET:-changeme_in_production_use_a_long_random_string}
      STORAGE_BACKEND: local
      STORAGE_PATH: /app/data/storage
    volumes:
      - storagedata:/app/data/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pentographer
      POSTGRES_PASSWORD: pentographer
      POSTGRES_DB: pentographer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pentographer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  storagedata:
